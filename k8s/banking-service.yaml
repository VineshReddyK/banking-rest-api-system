apiVersion: v1
kind: Service
metadata:
  name: banking-api-service
  namespace: banking
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: banking-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
